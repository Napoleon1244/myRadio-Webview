<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: rounded square, cream warm -->
  <rect width="512" height="512" rx="110" ry="110" fill="#faf9f7"/>
  <!-- Subtle inner shadow ring biar berasa ada depth -->
  <rect width="512" height="512" rx="110" ry="110" fill="none" stroke="#e8e3dc" stroke-width="6"/>
  
  <!-- Radio body -->
  <rect x="96" y="200" width="320" height="210" rx="28" ry="28" fill="#6b4fa0"/>
  <!-- Radio top highlight -->
  <rect x="96" y="200" width="320" height="50" rx="28" ry="28" fill="#8060b8"/>
  <rect x="96" y="228" width="320" height="22" fill="#8060b8"/>

  <!-- Antenna -->
  <rect x="180" y="100" width="12" height="110" rx="6" fill="#6b4fa0"/>
  <circle cx="186" cy="96" r="10" fill="#9070c8"/>

  <!-- Speaker grille dots -->
  <circle cx="170" cy="280" r="8" fill="#faf9f7" opacity="0.25"/>
  <circle cx="200" cy="280" r="8" fill="#faf9f7" opacity="0.25"/>
  <circle cx="230" cy="280" r="8" fill="#faf9f7" opacity="0.25"/>
  <circle cx="170" cy="310" r="8" fill="#faf9f7" opacity="0.25"/>
  <circle cx="200" cy="310" r="8" fill="#faf9f7" opacity="0.25"/>
  <circle cx="230" cy="310" r="8" fill="#faf9f7" opacity="0.25"/>
  <circle cx="170" cy="340" r="8" fill="#faf9f7" opacity="0.25"/>
  <circle cx="200" cy="340" r="8" fill="#faf9f7" opacity="0.25"/>
  <circle cx="230" cy="340" r="8" fill="#faf9f7" opacity="0.25"/>

  <!-- Tuning dial -->
  <circle cx="340" cy="310" r="52" fill="#5a3e8a"/>
  <circle cx="340" cy="310" r="38" fill="#7c5cac"/>
  <circle cx="340" cy="310" r="14" fill="#faf9f7" opacity="0.9"/>
  <!-- Dial mark -->
  <rect x="337" y="272" width="6" height="16" rx="3" fill="#faf9f7" opacity="0.7"/>

  <!-- Screen / freq display -->
  <rect x="112" y="214" width="200" height="28" rx="8" fill="#9070c8" opacity="0.5"/>

  <!-- Sound waves (live indicator) -->
  <path d="M390 230 Q410 256 390 282" stroke="#b39ddb" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M408 218 Q438 256 408 294" stroke="#b39ddb" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
